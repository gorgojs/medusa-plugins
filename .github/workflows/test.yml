name: Test Packages

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - '!packages/**/README.md'
      - '!packages/**/README.ru.md'
      - '!packages/**/CHANGELOG.md'
      - '!packages/**/package.json'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - '!packages/**/README.md'
      - '!packages/**/README.ru.md'
      - '!packages/**/CHANGELOG.md'
      - '!packages/**/package.json'
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run unit tests for changed plugins
        if: github.event_name != 'workflow_dispatch'
        run: yarn turbo run test:unit --filter='./packages/medusa-*...[origin/main]' --no-cache --force

      - name: Run unit tests for all plugins
        if: github.event_name == 'workflow_dispatch'
        run: yarn turbo run test:unit --filter='./packages/medusa-*' --no-cache --force

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    environment: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://${{ secrets.DB_USERNAME }}:${{ secrets.DB_PASSWORD }}@localhost:5432/${{ secrets.DB_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Inject environment secrets
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          echo "$SECRETS_JSON" | jq -r '
            to_entries[]
            | select(.value | type == "string")
            | "\(.key)<<__EOF_SECRET_\(.key)__\n\(.value)\n__EOF_SECRET_\(.key)__"
          ' >> "$GITHUB_ENV"

      - name: Run integration tests for changed plugins
      # if: github.event_name == 'push'
        run: yarn turbo run test:integration:http test:integration:modules --filter='[origin/main]...' --concurrency=1 --no-cache --force

      # - name: Run integration tests for all plugins
      #   if: github.event_name == 'workflow_dispatch'
      #   run: yarn turbo run test:integration:http test:integration:modules --filter='./integration-tests/*' --concurrency=1 --no-cache --force
